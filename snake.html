<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  :root[data-theme="dark"] {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #4ecca3;
    --text: #eaeaea;
    --text-muted: #888;
    --border: #2a2a4a;
    --snake-head: #4ecca3;
    --snake-body: #38b28a;
    --food: #e94560;
    --grid: #1e1e3a;
    --btn-bg: #0f3460;
    --btn-hover: #e94560;
    --overlay: rgba(10, 10, 20, 0.92);
  }
  :root[data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e2e8f0;
    --accent: #e53e3e;
    --accent2: #38a169;
    --text: #1a202c;
    --text-muted: #718096;
    --border: #cbd5e0;
    --snake-head: #38a169;
    --snake-body: #276749;
    --food: #e53e3e;
    --grid: #edf2f7;
    --btn-bg: #e2e8f0;
    --btn-hover: #e53e3e;
    --overlay: rgba(240, 244, 248, 0.95);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 820px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .theme-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: background 0.2s;
  }
  .theme-btn:hover { background: var(--surface2); }

  .hud {
    display: flex;
    gap: 24px;
    width: 100%;
    max-width: 820px;
  }

  .main-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    width: 100%;
    max-width: 820px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 280px;
    flex-shrink: 0;
  }

  .hud-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    flex: 1;
    text-align: center;
  }
  .hud-box .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .hud-box .value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .controls label {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .speed-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .speed-btn, .grid-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.15s, color 0.15s;
  }
  .speed-btn:hover, .grid-btn:hover { background: var(--surface2); }
  .speed-btn.active, .grid-btn.active {
    background: var(--accent2);
    color: #fff;
    border-color: var(--accent2);
    font-weight: 600;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--text);
    padding: 8px 0;
    user-select: none;
  }
  .checkbox-label input[type="checkbox"] { display: none; }
  .checkmark {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: var(--btn-bg);
    flex-shrink: 0;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .checkbox-label input:checked + .checkmark {
    background: var(--accent2);
    border-color: var(--accent2);
  }
  .checkbox-label input:checked + .checkmark::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 6px; height: 10px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .bonus-pill {
    background: #3b82f6;
    color: #fff;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .game-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  canvas {
    display: block;
    background: var(--grid);
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }
  .overlay.hidden { display: none; }

  .overlay h2 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .overlay .final-score {
    font-size: 1.1rem;
    color: var(--text-muted);
  }
  .overlay .final-score span {
    color: var(--text);
    font-weight: 700;
  }

  .name-input-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .name-input-wrap label {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .name-input {
    background: var(--surface);
    border: 2px solid var(--accent2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-align: center;
    width: 160px;
    text-transform: uppercase;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn.secondary {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn.secondary:hover { background: var(--surface2); opacity: 1; }

  .start-info {
    font-size: 0.9rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  /* High scores panel */
  .scores-panel {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .scores-panel h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .scores-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    background: var(--surface2);
  }

  .score-row .rank {
    font-size: 0.75rem;
    color: var(--text-muted);
    width: 20px;
    text-align: right;
  }

  .score-row .sname {
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    color: var(--accent2);
    width: 36px;
  }

  .score-row .sval {
    font-weight: 700;
    margin-left: auto;
    color: var(--text);
  }

  .score-row.gold { outline: 1px solid gold; }
  .score-row.gold .rank { color: gold; }

  .no-scores {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
    padding: 8px 0;
  }

  footer {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Snake</h1>
  <button class="theme-btn" id="themeBtn">🌙</button>
</header>

<div class="hud">
  <div class="hud-box">
    <div class="label">Score</div>
    <div class="value" id="scoreDisplay">0</div>
  </div>
  <div class="hud-box">
    <div class="label">Best</div>
    <div class="value" id="bestDisplay">0</div>
  </div>
  <div class="hud-box">
    <div class="label">Length</div>
    <div class="value" id="lengthDisplay">1</div>
  </div>
</div>

<div class="main-row">
  <div class="game-wrap">
    <canvas id="canvas" width="500" height="500"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
      <h2>Snake</h2>
      <p class="start-info">Use arrow keys or WASD to move.<br>Eat food to grow and score points!</p>
      <button class="btn" id="startBtn">Start Game</button>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
      <h2>Game Over</h2>
      <p class="final-score">Score: <span id="finalScore">0</span></p>
      <div class="name-input-wrap" id="nameWrap">
        <label>Enter your name (3 letters)</label>
        <input class="name-input" id="nameInput" maxlength="3" placeholder="AAA" autocomplete="off" spellcheck="false">
        <button class="btn" id="saveBtn">Save Score</button>
      </div>
      <p class="no-qualify" id="noQualify" style="display:none;font-size:0.85rem;color:var(--text-muted);text-align:center;">Not in the top 10 — keep playing!</p>
      <button class="btn secondary" id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="controls">
      <div class="controls-row">
        <label>Speed:</label>
      </div>
      <div class="speed-group">
        <button class="speed-btn" data-speed="slow">Slow</button>
        <button class="speed-btn active" data-speed="medium">Medium</button>
        <button class="speed-btn" data-speed="fast">Fast</button>
        <button class="speed-btn" data-speed="insane">Insane</button>
      </div>
    </div>

    <div class="controls">
      <div class="controls-row">
        <label>Grid:</label>
      </div>
      <div class="speed-group">
        <button class="grid-btn" data-grid="small">Small</button>
        <button class="grid-btn active" data-grid="medium">Medium</button>
        <button class="grid-btn" data-grid="large">Large</button>
      </div>
    </div>

    <div class="controls">
      <label class="checkbox-label">
        <input type="checkbox" id="bonusFoodToggle" checked>
        <span class="checkmark"></span>
        Blue bonus food <span class="bonus-pill">+3 boxes</span>
      </label>
    </div>

    <div class="scores-panel">
      <h3>High Scores</h3>
      <div class="scores-list" id="scoresList"></div>
    </div>
  </div>
</div>

<footer>Arrow keys or WASD &nbsp;|&nbsp; Pause: Space</footer>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const CANVAS_SIZE = 500;
  const GRIDS = { small: 12, medium: 20, large: 30 };
  const SPEEDS = { slow: 200, medium: 130, fast: 85, insane: 50 };
  const LS_SCORES = 'snake-hiscores';
  const LS_THEME  = 'snake-theme';

  let COLS = GRIDS.medium, ROWS = GRIDS.medium, CELL = CANVAS_SIZE / COLS;

  // ── State ───────────────────────────────────────────────────────────────────
  let snake, dir, nextDir, food, bonusFood, score, gameOver, paused, loop, speed;

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const scoreEl     = document.getElementById('scoreDisplay');
  const bestEl      = document.getElementById('bestDisplay');
  const lengthEl    = document.getElementById('lengthDisplay');
  const startOverlay   = document.getElementById('startOverlay');
  const gameOverOverlay= document.getElementById('gameOverOverlay');
  const finalScoreEl   = document.getElementById('finalScore');
  const nameInput      = document.getElementById('nameInput');
  const startBtn       = document.getElementById('startBtn');
  const saveBtn        = document.getElementById('saveBtn');
  const restartBtn     = document.getElementById('restartBtn');
  const scoresList     = document.getElementById('scoresList');
  const themeBtn       = document.getElementById('themeBtn');

  // ── Theme ────────────────────────────────────────────────────────────────────
  let theme = localStorage.getItem(LS_THEME) || 'dark';
  applyTheme(theme);

  function applyTheme(t) {
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(LS_THEME, t);
  }

  themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

  // ── Speed ────────────────────────────────────────────────────────────────────
  speed = SPEEDS.medium;

  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      speed = SPEEDS[btn.dataset.speed];
      if (loop) { clearInterval(loop); loop = setInterval(tick, speed); }
    });
  });

  // ── Grid size ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('.grid-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      COLS = GRIDS[btn.dataset.grid];
      ROWS = COLS;
      CELL = CANVAS_SIZE / COLS;
    });
  });

  // ── High scores ───────────────────────────────────────────────────────────────
  function loadScores() {
    try { return JSON.parse(localStorage.getItem(LS_SCORES)) || []; }
    catch { return []; }
  }

  function saveScore(name, sc) {
    const scores = loadScores();
    scores.push({ name: name.toUpperCase().padEnd(3, ' ').slice(0, 3), score: sc });
    scores.sort((a, b) => b.score - a.score);
    scores.splice(10); // keep top 10
    localStorage.setItem(LS_SCORES, JSON.stringify(scores));
    renderScores();
  }

  function bestScore() {
    const s = loadScores();
    return s.length ? s[0].score : 0;
  }

  function renderScores() {
    const scores = loadScores();
    if (!scores.length) {
      scoresList.innerHTML = '<p class="no-scores">No scores yet — play a game!</p>';
      return;
    }
    scoresList.innerHTML = scores.map((s, i) => `
      <div class="score-row${i === 0 ? ' gold' : ''}">
        <span class="rank">#${i + 1}</span>
        <span class="sname">${escHtml(s.name)}</span>
        <span class="sval">${s.score}</span>
      </div>`).join('');
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  renderScores();

  // ── Audio ─────────────────────────────────────────────────────────────────────
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playEatSound() {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
  }

  // ── Game init ─────────────────────────────────────────────────────────────────
  function initGame() {
    const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake    = [{ x: cx, y: cy }];
    for (let i = 1; i < 5; i++) snake.push({ x: cx - i, y: cy }); // start with 5 segments
    dir      = { x: 1, y: 0 };
    nextDir  = { x: 1, y: 0 };
    score     = 0;
    gameOver  = false;
    paused    = false;
    bonusFood = null;
    placeFood();
    updateHud();
  }

  function freeCells() {
    const cells = [];
    for (let x = 0; x < COLS; x++)
      for (let y = 0; y < ROWS; y++)
        if (!snake.some(s => s.x === x && s.y === y)
            && !(food && food.x === x && food.y === y)
            && !(bonusFood && bonusFood.x === x && bonusFood.y === y))
          cells.push({ x, y });
    return cells;
  }

  function placeFood() {
    const cells = freeCells();
    food = cells[Math.floor(Math.random() * cells.length)];
  }

  function tryPlaceBonusFood() {
    if (!document.getElementById('bonusFoodToggle').checked) return;
    if (bonusFood) return; // already on board
    if (Math.random() < 0.3) { // 30% chance each time regular food is eaten
      const cells = freeCells();
      if (cells.length) bonusFood = cells[Math.floor(Math.random() * cells.length)];
    }
  }

  // ── Tick ──────────────────────────────────────────────────────────────────────
  function tick() {
    if (paused || gameOver) return;

    dir = { ...nextDir };

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    const ate      = head.x === food.x && head.y === food.y;
    const ateBonus = bonusFood && head.x === bonusFood.x && head.y === bonusFood.y;

    if (ate) {
      playEatSound();
      score += 10;
      if (snake.length <= 5)        score += 0;
      else if (snake.length <= 10)  score += 5;
      else                          score += 10;
      placeFood();
      tryPlaceBonusFood();
    } else if (ateBonus) {
      playEatSound();
      // grow 2 extra segments (head already added = 3 total)
      const tail = snake[snake.length - 1];
      snake.push({ ...tail }, { ...tail });
      bonusFood = null;
    } else {
      snake.pop();
    }

    // clear bonus food if checkbox was unchecked mid-game
    if (!document.getElementById('bonusFoodToggle').checked) bonusFood = null;

    updateHud();
    draw();
  }

  function qualifiesForLeaderboard(sc) {
    const scores = loadScores();
    return scores.length < 10 || sc > scores[scores.length - 1].score;
  }

  function endGame() {
    gameOver = true;
    clearInterval(loop);
    loop = null;
    finalScoreEl.textContent = score;
    nameInput.value = '';
    gameOverOverlay.classList.remove('hidden');
    const qualifies = qualifiesForLeaderboard(score);
    document.getElementById('nameWrap').style.display = qualifies ? '' : 'none';
    document.getElementById('noQualify').style.display = qualifies ? 'none' : '';
    if (qualifies) nameInput.focus();
  }

  // ── Draw ──────────────────────────────────────────────────────────────────────
  function getCSSVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = getCSSVar('--border');
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // Regular food
    const fr = Math.max(3, CELL / 2 - 3);
    ctx.fillStyle = getCSSVar('--food');
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, fr, 0, Math.PI * 2);
    ctx.fill();

    // Bonus food (blue diamond)
    if (bonusFood) {
      const bx = bonusFood.x * CELL + CELL / 2;
      const by = bonusFood.y * CELL + CELL / 2;
      const br = Math.max(4, CELL / 2 - 2);
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.moveTo(bx,      by - br);
      ctx.lineTo(bx + br, by);
      ctx.lineTo(bx,      by + br);
      ctx.lineTo(bx - br, by);
      ctx.closePath();
      ctx.fill();
      // white inner dot
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(bx, by, Math.max(1.5, br * 0.3), 0, Math.PI * 2);
      ctx.fill();
    }

    // Snake
    const eyeOffset = Math.max(2, CELL * 0.18);
    const eyeSize   = Math.max(1.5, CELL * 0.12);
    const eyeFwd    = Math.max(2, CELL * 0.18);
    snake.forEach((seg, i) => {
      const x = seg.x * CELL + 1, y = seg.y * CELL + 1;
      const s = CELL - 2;
      ctx.fillStyle = i === 0 ? getCSSVar('--snake-head') : getCSSVar('--snake-body');
      ctx.beginPath();
      ctx.roundRect(x, y, s, s, i === 0 ? Math.min(6, CELL * 0.25) : Math.min(3, CELL * 0.12));
      ctx.fill();

      // Eyes on head
      if (i === 0) {
        ctx.fillStyle = getCSSVar('--bg');
        const ex = seg.x * CELL + CELL / 2;
        const ey = seg.y * CELL + CELL / 2;
        if (dir.x === 1)  { drawEye(ex+eyeFwd, ey-eyeOffset, eyeSize); drawEye(ex+eyeFwd, ey+eyeOffset, eyeSize); }
        if (dir.x === -1) { drawEye(ex-eyeFwd, ey-eyeOffset, eyeSize); drawEye(ex-eyeFwd, ey+eyeOffset, eyeSize); }
        if (dir.y === -1) { drawEye(ex-eyeOffset, ey-eyeFwd, eyeSize); drawEye(ex+eyeOffset, ey-eyeFwd, eyeSize); }
        if (dir.y === 1)  { drawEye(ex-eyeOffset, ey+eyeFwd, eyeSize); drawEye(ex+eyeOffset, ey+eyeFwd, eyeSize); }
      }
    });

    // Pause indicator
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 2rem Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'left';
    }
  }

  function drawEye(x, y, r) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }

  function updateHud() {
    scoreEl.textContent  = score;
    lengthEl.textContent = snake.length;
    bestEl.textContent   = Math.max(bestScore(), score);
  }

  // ── Input ─────────────────────────────────────────────────────────────────────
  const DIRS = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
    ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 }, A: { x:-1, y:  0 },
    ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
  };

  document.addEventListener('keydown', e => {
    if (e.key === ' ') {
      e.preventDefault();
      if (!gameOver && loop) { paused = !paused; draw(); }
      return;
    }
    const d = DIRS[e.key];
    if (!d) return;
    if (e.key.startsWith('Arrow')) e.preventDefault();
    // Prevent reversing
    if (d.x !== 0 && d.x === -dir.x) return;
    if (d.y !== 0 && d.y === -dir.y) return;
    nextDir = d;
  });

  // ── Name input: enforce letters only ─────────────────────────────────────────
  nameInput.addEventListener('input', () => {
    nameInput.value = nameInput.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
  });

  // ── Buttons ───────────────────────────────────────────────────────────────────
  // Resume AudioContext on first interaction (browser autoplay policy)
  [startBtn, restartBtn].forEach(b => b.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }));

  startBtn.addEventListener('click', startGame);

  saveBtn.addEventListener('click', () => {
    const name = nameInput.value.trim();
    if (name.length < 1) { nameInput.focus(); return; }
    saveScore(name.padEnd(3, 'X'), score);
    bestEl.textContent = bestScore();
    document.getElementById('nameWrap').style.display = 'none';
  });

  restartBtn.addEventListener('click', startGame);

  function startGame() {
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    document.getElementById('nameWrap').style.display = '';
    clearInterval(loop);
    initGame();
    draw();
    loop = setInterval(tick, speed);
  }

  // Initial draw
  draw();
</script>
</body>
</html>
